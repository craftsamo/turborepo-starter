name: Tests

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/tests.yml"
      - ".cz-config.js"
      - ".husky/**"
      - "apps/**"
      - "commitlint.config.js"
      - "package.json"
      - "package-scripts.js"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/**"
      - "turbo.json"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  # Let Corepack download the pinned pnpm without an interactive prompt in CI.
  COREPACK_ENABLE_DOWNLOAD_PROMPT: 0

jobs:
  script-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          package-manager-cache: false
      - name: Test repository scripts
        run: npx nps test.ci.scripts

  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.force.outputs.web || steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            web:
              - '.github/workflows/tests.yml'
              - 'apps/web/**'
              - 'package.json'
              - 'package-scripts.js'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'scripts/**'
              - 'turbo.json'
      - name: Run all checks for manual dispatch
        id: force
        if: github.event_name == 'workflow_dispatch'
        run: echo "web=true" >> "$GITHUB_OUTPUT"

  setup:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    outputs:
      pnpm-store-dir: ${{ steps.pnpm-store.outputs.dir }}
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          # setup-node@v5 enables package-manager caching by default and probes
          # pnpm (from the packageManager field) before Corepack runs. Disable it;
          # Corepack is enabled below and the pnpm store is cached manually.
          package-manager-cache: false
      - name: Enable Corepack
        run: corepack enable
      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "dir=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile
      - name: TypeScript versions
        run: |
          pnpm exec tsc --version
          pnpm exec tsc6 --version
          node -e "console.log('Compiler API ' + require('typescript').version)"
      - name: Lint
        run: npx nps lint
      - name: Typecheck
        run: npx nps typecheck

  test:
    needs: [setup, changes]
    runs-on: ubuntu-latest
    if: needs.setup.result == 'success'
    strategy:
      matrix:
        include:
          - target: web
            run: ${{ needs.changes.outputs.web }}
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          # setup-node@v5 enables package-manager caching by default and probes
          # pnpm (from the packageManager field) before Corepack runs. Disable it;
          # Corepack is enabled below and the pnpm store is cached manually.
          package-manager-cache: false
      - name: Enable Corepack
        run: corepack enable
      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ needs.setup.outputs.pnpm-store-dir }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Prepare
        if: matrix.run == 'true'
        run: npx nps prepare.ci.${{ matrix.target }}
      - name: Build
        if: matrix.run == 'true'
        run: npx nps build.ci.${{ matrix.target }}
      - name: Test
        if: matrix.run == 'true'
        run: npx nps test.ci.${{ matrix.target }}

  required-checks:
    name: Required checks
    if: always()
    needs: [script-tests, changes, setup, test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        env:
          SCRIPT_TESTS_RESULT: ${{ needs.script-tests.result }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          WEB_CHANGED: ${{ needs.changes.outputs.web }}
          SETUP_RESULT: ${{ needs.setup.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          if [[ "$SCRIPT_TESTS_RESULT" != "success" || "$CHANGES_RESULT" != "success" ]]; then
            exit 1
          fi

          if [[ "$WEB_CHANGED" == "true" && ( "$SETUP_RESULT" != "success" || "$TEST_RESULT" != "success" ) ]]; then
            exit 1
          fi
